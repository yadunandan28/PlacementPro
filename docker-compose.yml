version: '3.8'

services:

  # ── Main Backend (Port 5000) ───────────────────────────
  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    ports:
      - "5000:5000"
    env_file:
      - ./server/.env
    environment:
      - PORT=5000
      - CAREER_AI_SERVICE_URL=http://career-ai-service:8000
    depends_on:
      - career-ai-service
    restart: unless-stopped

  # ── Career AI Service (Port 8000) ───────────────────────
  career-ai-service:
    build:
      context: ./career-ai-service
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - ENABLE_EMBEDDINGS=false
      - JOB_DATASET_PATH=data/jobs.csv
    restart: unless-stopped

  # ── Interview Microservice (Port 5001) ─────────────────
  interview-service:
    build:
      context: ./interview-service
      dockerfile: Dockerfile
    ports:
      - "5001:5001"
    env_file:
      - ./interview-service/.env
    environment:
      - PORT=5001
      - MAIN_API_URL=http://server:5000
    depends_on:
      - server
    restart: unless-stopped

  # ── Frontend (Port 5173) ───────────────────────────────
  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    ports:
      - "5173:80"
    depends_on:
      - server
      - interview-service
      - career-ai-service
    restart: unless-stopped