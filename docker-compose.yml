services:

  # ── Main Backend (Port 5000) ───────────────────────────
  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    ports:
      - "5000:5000"
    environment:
      PORT: 5000
      NODE_ENV: production
      MONGO_URI: ${MONGO_URI}
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      JWT_ACCESS_EXPIRE: ${JWT_ACCESS_EXPIRE:-15m}
      JWT_REFRESH_EXPIRE: ${JWT_REFRESH_EXPIRE:-7d}
      CLOUDINARY_CLOUD_NAME: ${CLOUDINARY_CLOUD_NAME}
      CLOUDINARY_API_KEY: ${CLOUDINARY_API_KEY}
      CLOUDINARY_API_SECRET: ${CLOUDINARY_API_SECRET}
      PISTON_URL: http://piston:2000
      COLLEGE_EMAIL_DOMAIN: ${COLLEGE_EMAIL_DOMAIN:-kct.ac.in}
      GROQ_API_KEY: ${GROQ_API_KEY}
    depends_on:
      - piston
    restart: unless-stopped

  # ── Interview Microservice (Port 5001) ─────────────────
  interview-service:
    build:
      context: ./interview-service
      dockerfile: Dockerfile
    ports:
      - "5001:5001"
    environment:
      PORT: 5001
      NODE_ENV: production
      MONGO_URI: ${MONGO_URI}
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET}
      GROQ_API_KEY: ${GROQ_API_KEY}
      MAIN_API_URL: http://server:5000
      CLIENT_URL: ${CLIENT_URL:-http://localhost:5173}
      CLOUDINARY_CLOUD_NAME: ${CLOUDINARY_CLOUD_NAME}
      CLOUDINARY_API_KEY: ${CLOUDINARY_API_KEY}
      CLOUDINARY_API_SECRET: ${CLOUDINARY_API_SECRET}
      PISTON_URL: http://piston:2000
    depends_on:
      - server
      - piston
    restart: unless-stopped

  # ── Piston Code Execution Engine (Port 2000) ───────────
  piston:
    image: ghcr.io/engineer-man/piston
    privileged: true
    volumes:
      - piston_data:/piston
    ports:
      - "2000:2000"
    restart: unless-stopped

  # ── Frontend (Port 5173) ───────────────────────────────
  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    ports:
      - "5173:80"
    depends_on:
      - server
      - interview-service
    restart: unless-stopped

volumes:
  piston_data: